<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Un secretito del mar 🐟</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;900&display=swap" rel="stylesheet">
<style>
* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; user-select:none; }

body {
  font-family:'Nunito',sans-serif;
  background:#000;
  width:100vw; height:100vh;
  overflow:hidden;
  display:flex; align-items:center; justify-content:center;
}

#game {
  width:100vw; height:100vh;
  position:relative; overflow:hidden;
}

/* Single canvas catches ALL input */
#c {
  position:absolute; top:0; left:0;
  width:100%; height:100%;
  touch-action:none;
  cursor:pointer;
  z-index:1;
}

/* All HTML overlays: pointer-events:none so canvas always gets touch first */
#ui {
  position:absolute; top:0; left:0;
  width:100%; height:100%;
  pointer-events:none;
  z-index:2;
  display:flex; flex-direction:column;
  align-items:center; justify-content:flex-end;
  padding-bottom:52px; gap:10px;
}

.bubble {
  background:rgba(255,255,255,0.93);
  color:#1a3a5c;
  font-size:clamp(18px,5vw,24px);
  font-weight:700;
  padding:12px 26px;
  border-radius:999px;
  box-shadow:0 4px 24px rgba(0,0,0,0.3);
  text-align:center;
  max-width:88%;
  line-height:1.3;
  opacity:0;
  transform:translateY(16px);
  transition:opacity 0.4s, transform 0.4s;
}
.bubble.on { opacity:1; transform:translateY(0); }
.bubble.yellow { background:rgba(255,230,60,0.96); color:#7a4a00; font-size:clamp(15px,4.2vw,19px); }

#heart-full {
  position:absolute; top:0; left:0;
  width:100%; height:100%;
  display:flex; align-items:center; justify-content:center;
  pointer-events:none;
  z-index:2;
  opacity:0; transition:opacity 0.5s;
}
#heart-full.on { opacity:1; }

@keyframes popHeart {
  0%   { transform:scale(0.1); opacity:0; }
  65%  { transform:scale(1.12); opacity:1; }
  100% { transform:scale(1);   opacity:1; }
}
#heart-svg { display:block; }
#heart-full.on #heart-svg { animation:popHeart 0.75s ease forwards; }

#end {
  position:absolute; top:0; left:0;
  width:100%; height:100%;
  display:flex; align-items:center; justify-content:center;
  pointer-events:none;
  z-index:3;
  opacity:0; transition:opacity 1.2s;
}
#end.on { opacity:1; }
#end-box {
  font-size:clamp(22px,6vw,30px);
  font-weight:900; color:#fff;
  text-align:center; line-height:1.6;
  padding:24px 36px;
  background:rgba(255,255,255,0.1);
  border-radius:20px;
  border:1px solid rgba(255,255,255,0.2);
}
</style>
</head>
<body>
<div id="game">
  <canvas id="c"></canvas>

  <div id="ui">
    <div class="bubble yellow" id="fmsg"></div>
    <div class="bubble" id="mmsg"></div>
  </div>

  <div id="heart-full">
    <svg id="heart-svg" width="270" height="250" viewBox="0 0 270 250">
      <defs>
        <linearGradient id="hg" x1="0%" y1="0%" x2="100%" y2="100%">
          <stop offset="0%" stop-color="#ff7096"/>
          <stop offset="100%" stop-color="#e8003a"/>
        </linearGradient>
      </defs>
      <path d="M135 215 C135 215 18 138 18 68 C18 28 50 8 90 8 C112 8 128 22 135 32 C142 22 158 8 180 8 C220 8 252 28 252 68 C252 138 135 215 135 215Z"
            fill="url(#hg)"/>
      <text x="135" y="90"  text-anchor="middle" font-family="Nunito,sans-serif" font-size="25" font-weight="900" fill="#fff">te quiedo</text>
      <text x="135" y="125" text-anchor="middle" font-family="Nunito,sans-serif" font-size="25" font-weight="900" fill="#fff">con todo</text>
      <text x="135" y="160" text-anchor="middle" font-family="Nunito,sans-serif" font-size="25" font-weight="900" fill="#fff">mi todo</text>
    </svg>
  </div>

  <div id="end"><div id="end-box">🌙 buenas noches<br>gosheyo 🌙</div></div>
</div>

<script>
// ── CANVAS ──────────────────────────────────────────────────────────────────
const canvas = document.getElementById('c');
const ctx    = canvas.getContext('2d');

let W = canvas.width  = window.innerWidth;
let H = canvas.height = window.innerHeight;

window.addEventListener('resize', () => {
  W = canvas.width  = window.innerWidth;
  H = canvas.height = window.innerHeight;
  placeThings();
});

// ── UI REFS ─────────────────────────────────────────────────────────────────
const fmsgEl    = document.getElementById('fmsg');
const mmsgEl    = document.getElementById('mmsg');
const heartFull = document.getElementById('heart-full');
const endEl     = document.getElementById('end');

function showF(t,d=0){ setTimeout(()=>{ fmsgEl.textContent=t; fmsgEl.classList.add('on'); },d); }
function showM(t,d=0){ setTimeout(()=>{ mmsgEl.textContent=t; mmsgEl.classList.add('on'); },d); }
function hideF(){ fmsgEl.classList.remove('on'); }
function hideM(){ mmsgEl.classList.remove('on'); }
function hideAll(){ hideF(); hideM(); }

// ── STATE ────────────────────────────────────────────────────────────────────
let scene = 'ocean';
let fishX, fishY, fishDir=1;
let fleeTX, fleeTY;
let animF=0;
let nightAlpha=0;
let corals=[];

let bubbles=[], stars=[];
for(let i=0;i<20;i++) bubbles.push({xr:Math.random(),yr:Math.random(),r:Math.random()*4+2,s:Math.random()*.5+.25,a:Math.random()*.3+.08});
for(let i=0;i<70;i++) stars.push({xr:Math.random(),yr:Math.random()*.42,r:Math.random()*1.8+.4,tw:Math.random()*Math.PI*2});

let reefX, reefY;

function placeThings(){
  if(scene==='ocean'||scene==='idle1'){
    fishX=W*.5; fishY=H*.5;
  }
  reefX=W*.5; reefY=H*.72;
  corals=[
    {x:reefX-W*.17, y:reefY-H*.13, w:W*.13, h:H*.12, c1:'#2ecc71',c2:'#1a9c50',alive:true},
    {x:reefX-W*.04, y:reefY-H*.16, w:W*.12, h:H*.15, c1:'#e74c3c',c2:'#a93226',alive:true},
    {x:reefX+W*.06, y:reefY-H*.14, w:W*.14, h:H*.13, c1:'#f39c12',c2:'#c0770a',alive:true},
  ];
}
placeThings();
fishX=W*.5; fishY=H*.5;

// ── INPUT: single pointerdown on canvas ──────────────────────────────────────
canvas.addEventListener('pointerdown', onTap, {passive:false});

function onTap(e){
  e.preventDefault();
  const r=canvas.getBoundingClientRect();
  const tx=(e.clientX-r.left)*(W/r.width);
  const ty=(e.clientY-r.top)*(H/r.height);
  dispatch(tx,ty);
}

function d2(ax,ay,bx,by){ return Math.sqrt((ax-bx)**2+(ay-by)**2); }

function dispatch(tx,ty){
  switch(scene){
    case 'ocean':
      if(d2(tx,ty,fishX,fishY)<Math.min(W,H)*.14) startFlee1();
      break;
    case 'idle1':
      if(d2(tx,ty,fishX,fishY)<Math.min(W,H)*.14) startFlee2();
      break;
    case 'hiding':
      corals.forEach(c=>{
        if(!c.alive) return;
        const pad=Math.min(W,H)*.04;
        if(tx>=c.x-pad && tx<=c.x+c.w+pad && ty>=c.y-pad && ty<=c.y+c.h+pad){
          c.alive=false;
          if(corals.every(x=>!x.alive)) revealHeart();
        }
      });
      break;
    case 'heartshow':
      if(d2(tx,ty,fishX,fishY)<Math.min(W,H)*.18) openHeart();
      break;
    case 'heartclick':
      // tap anywhere on screen opens big heart
      showBigHeart();
      break;
  }
}

// ── SCENES ───────────────────────────────────────────────────────────────────
function startFlee1(){
  scene='fleeing1';
  hideAll();
  fleeTX=W*.12; fleeTY=H*.22;
  showF('¡Ayiooos a los gosheyos!',80);
  setTimeout(()=>{
    scene='idle1';
    hideF();
    showM('tócame otra vez',300);
  },2400);
}

function startFlee2(){
  scene='fleeing2';
  hideAll();
  fleeTX=reefX; fleeTY=reefY-H*.09;
  showF('dije que ¡ayiooos a los gosheyos!',80);
  setTimeout(()=>{
    fishX=reefX; fishY=reefY-H*.09;
    scene='hiding';
    hideF();
    showM('búscame',400);
  },2600);
}

function revealHeart(){
  scene='heartshow';
  hideAll();
  showF('mida lo que te traje',350);
  setTimeout(()=> showM('toca el corazón',200), 1300);
}

function openHeart(){
  scene='heartclick';
  hideAll();
  heartFull.classList.add('on');
}

function showBigHeart(){
  scene='heartbig';
  setTimeout(()=>{
    heartFull.classList.remove('on');
    scene='night';
    startNight();
  },4000);
}

function startNight(){
  fishX=reefX; fishY=reefY-H*.09;
  fleeTX=W*.5; fleeTY=H*.14;
  const iv=setInterval(()=>{
    nightAlpha=Math.min(1,nightAlpha+0.016);
    if(nightAlpha>=1) clearInterval(iv);
  },40);
  setTimeout(()=>{
    fishX=W*.5; fishY=H*.14;
    showF('buenas noches gosheyo 🌙',400);
    setTimeout(()=> endEl.classList.add('on'), 2200);
  },3700);
}

// ── DRAWING ──────────────────────────────────────────────────────────────────
function lerpColor(a,b,t){
  const p=v=>parseInt(v,16);
  const r=(n,s,e)=>Math.round(n+(e-n)*t);
  return `rgb(${r(p(a.slice(1,3)),0,p(b.slice(1,3)))},${r(p(a.slice(3,5)),0,p(b.slice(3,5)))},${r(p(a.slice(5,7)),0,p(b.slice(5,7)))})`;
}

function drawBg(){
  const t=Date.now()*.001;

  // Sky/ocean gradient
  const g=ctx.createLinearGradient(0,0,0,H);
  g.addColorStop(0, lerpColor('#081840','#03081e',nightAlpha));
  g.addColorStop(.5, lerpColor('#0a4a7a','#06122e',nightAlpha));
  g.addColorStop(1,  lerpColor('#062238','#020c18',nightAlpha));
  ctx.fillStyle=g; ctx.fillRect(0,0,W,H);

  // Stars + moon at night
  if(nightAlpha>.1){
    stars.forEach(s=>{
      const tw=.5+.5*Math.sin(t*1.8+s.tw);
      ctx.globalAlpha=nightAlpha*tw*.9;
      ctx.fillStyle='#fff';
      ctx.beginPath(); ctx.arc(s.xr*W,s.yr*H,s.r,0,Math.PI*2); ctx.fill();
    });
    ctx.globalAlpha=nightAlpha;
    ctx.fillStyle='#fffde7';
    ctx.shadowColor='#fffde7'; ctx.shadowBlur=30;
    ctx.beginPath(); ctx.arc(W*.82,H*.09,Math.min(W,H)*.055,0,Math.PI*2); ctx.fill();
    ctx.shadowBlur=0;
    ctx.globalAlpha=1;
  }

  // Surface shimmer
  ctx.strokeStyle='rgba(255,255,255,0.07)'; ctx.lineWidth=1;
  for(let i=0;i<6;i++){
    const ry=H*.07+i*13+Math.sin(t+i)*5;
    ctx.beginPath(); ctx.moveTo(0,ry);
    ctx.bezierCurveTo(W*.3,ry+6*Math.sin(t*.7+i),W*.7,ry-6*Math.sin(t*.5+i),W,ry);
    ctx.stroke();
  }

  // Bubbles
  bubbles.forEach(b=>{
    b.yr-=b.s/H;
    b.xr+=Math.sin(t+b.yr*9)*.0007;
    if(b.yr<0){b.yr=1+Math.random()*.3;b.xr=Math.random();}
    ctx.globalAlpha=b.a;
    ctx.strokeStyle='rgba(150,210,255,.8)'; ctx.lineWidth=.8;
    ctx.beginPath(); ctx.arc(b.xr*W,b.yr*H,b.r,0,Math.PI*2); ctx.stroke();
  });
  ctx.globalAlpha=1;

  // Sea floor
  const fy=H*.84;
  const sg=ctx.createLinearGradient(0,fy,0,H);
  sg.addColorStop(0,'#b8973c'); sg.addColorStop(.3,'#8f6e28'); sg.addColorStop(1,'#614a15');
  ctx.fillStyle=sg;
  ctx.beginPath(); ctx.moveTo(0,fy);
  for(let x=0;x<=W;x+=28) ctx.lineTo(x,fy+Math.sin(x*.05+t*.25)*7);
  ctx.lineTo(W,H); ctx.lineTo(0,H); ctx.closePath(); ctx.fill();

  // Seaweeds
  [.08,.18,.38,.55,.7,.88].forEach((px,i)=>{
    const bh=H*.05+(i%3)*H*.03, bx=px*W;
    ctx.strokeStyle=i%2===0?'#2ecc71':'#27ae60'; ctx.lineWidth=3.5; ctx.lineCap='round';
    ctx.beginPath(); ctx.moveTo(bx,fy);
    ctx.bezierCurveTo(bx+Math.sin(t*.8+i)*16,fy-bh*.33,bx+Math.sin(t*.6+i+1)*12,fy-bh*.66,bx+Math.sin(t*.5+i+2)*9,fy-bh);
    ctx.stroke();
  });

  // Rocks
  [[.12,.88,W*.05],[.5,.9,W*.035],[.72,.87,W*.06],[.28,.91,W*.028]].forEach(([rx,ry,rs])=>{
    ctx.fillStyle='#4a3c2c';
    ctx.beginPath(); ctx.ellipse(rx*W,ry*H,rs,rs*.55,0,0,Math.PI*2); ctx.fill();
  });
}

function drawReef(){
  const fy=H*.84;
  const rg=ctx.createRadialGradient(reefX,fy,4,reefX,fy,W*.2);
  rg.addColorStop(0,'#e67e22'); rg.addColorStop(1,'#a04010');
  ctx.fillStyle=rg;
  ctx.beginPath(); ctx.ellipse(reefX,fy-H*.01,W*.19,H*.05,0,0,Math.PI*2); ctx.fill();
  [[reefX-W*.07,fy-H*.045,'#e74c3c'],[reefX,fy-H*.06,'#9b59b6'],[reefX+W*.07,fy-H*.04,'#2980b9']].forEach(([cx,cy,col])=>{
    ctx.fillStyle=col; ctx.beginPath(); ctx.arc(cx,cy,W*.028,0,Math.PI*2); ctx.fill();
  });
}

function drawCoral(c){
  if(!c.alive) return;
  const cx=c.x+c.w*.5;
  ctx.fillStyle=c.c2; ctx.fillRect(cx-4,c.y+c.h*.4,8,c.h*.6);
  for(let i=0;i<5;i++){
    const bx=c.x+(c.w/4)*i, by=c.y+c.h*.44-(i%2===0?c.h*.22:0);
    ctx.fillStyle=i%2===0?c.c1:c.c2;
    ctx.beginPath(); ctx.arc(bx,by,c.w*.22-Math.abs(i-2)*2,0,Math.PI*2); ctx.fill();
  }
  ctx.fillStyle=c.c1; ctx.beginPath(); ctx.arc(cx,c.y+c.h*.1,c.w*.26,0,Math.PI*2); ctx.fill();
}

function drawFish(x,y,dir,f,sz=1){
  ctx.save();
  ctx.translate(x,y); ctx.scale(dir,1);
  const s=sz*Math.min(W,H)*.055;

  ctx.fillStyle='#c0392b';
  ctx.beginPath();
  ctx.moveTo(-s*.9,0);
  ctx.lineTo(-s*1.6,-s*.56+Math.sin(f*.22)*s*.3);
  ctx.lineTo(-s*1.6,s*.56+Math.sin(f*.22+.5)*s*.3);
  ctx.closePath(); ctx.fill();

  const bg=ctx.createRadialGradient(-s*.15,-s*.15,s*.04,0,0,s);
  bg.addColorStop(0,'#ff7070'); bg.addColorStop(.5,'#e74c3c'); bg.addColorStop(1,'#b03020');
  ctx.fillStyle=bg;
  ctx.beginPath(); ctx.ellipse(0,0,s,s*.6,0,0,Math.PI*2); ctx.fill();

  ctx.fillStyle='rgba(255,180,180,.45)';
  ctx.beginPath(); ctx.ellipse(s*.07,s*.15,s*.5,s*.27,0,0,Math.PI*2); ctx.fill();

  ctx.fillStyle='#a93226';
  ctx.beginPath(); ctx.moveTo(s*.15,-s*.55); ctx.lineTo(s*.6,-s*.95); ctx.lineTo(s*.8,-s*.55); ctx.closePath(); ctx.fill();

  ctx.fillStyle='rgba(200,50,40,.65)';
  ctx.beginPath(); ctx.ellipse(s*.15,s*.27,s*.33,s*.18,.5,0,Math.PI*2); ctx.fill();

  ctx.fillStyle='#fff'; ctx.beginPath(); ctx.arc(s*.65,-s*.16,s*.24,0,Math.PI*2); ctx.fill();
  ctx.fillStyle='#111'; ctx.beginPath(); ctx.arc(s*.68,-s*.16,s*.14,0,Math.PI*2); ctx.fill();
  ctx.fillStyle='#fff'; ctx.beginPath(); ctx.arc(s*.73,-s*.22,s*.05,0,Math.PI*2); ctx.fill();

  ctx.strokeStyle='rgba(255,255,255,.8)'; ctx.lineWidth=1.5;
  ctx.beginPath(); ctx.moveTo(s*.92,-s*.04); ctx.lineTo(s*1.2,s*.07); ctx.stroke();

  ctx.fillStyle='#fff';
  [[s*.98,0],[s*1.09,0],[s*.96,s*.1],[s*1.07,s*.1]].forEach(([tx,ty])=>{
    ctx.beginPath(); ctx.moveTo(tx,-s*.07); ctx.lineTo(tx-s*.07,s*.14); ctx.lineTo(tx+s*.07,s*.14); ctx.closePath(); ctx.fill();
  });

  ctx.restore();
}

function drawFloatingHeart(x,y){
  const t=Date.now()*.003;
  const hy=y-Math.min(W,H)*.1+Math.sin(t)*6;
  const hs=Math.min(W,H)*.05;
  ctx.save();
  ctx.translate(x,hy);
  ctx.fillStyle='#ff4070';
  ctx.shadowColor='#ff4070'; ctx.shadowBlur=14;
  ctx.beginPath();
  ctx.moveTo(0,hs*.28);
  ctx.bezierCurveTo(-hs*.8,-hs*.35,-hs,hs*.55,0,hs);
  ctx.bezierCurveTo(hs,hs*.55,hs*.8,-hs*.35,0,hs*.28);
  ctx.fill(); ctx.shadowBlur=0;
  ctx.restore();
}

// ── UPDATE ───────────────────────────────────────────────────────────────────
function update(){
  animF++;
  if(scene==='fleeing1'){
    fishX+=(fleeTX-fishX)*.09;
    fishY+=(fleeTY-fishY)*.09+Math.sin(animF*.18)*2;
    fishDir=fleeTX<fishX?-1:1;
  } else if(scene==='fleeing2'){
    fishX+=(fleeTX-fishX)*.055;
    fishY+=(fleeTY-fishY)*.055+Math.sin(animF*.18)*1.5;
    fishDir=1;
  } else if(scene==='ocean'||scene==='idle1'){
    fishX+=Math.sin(animF*.018)*W*.0015;
    fishY+=Math.cos(animF*.014)*H*.0008;
  } else if(scene==='night'){
    fishX+=(fleeTX-fishX)*.018;
    fishY+=(fleeTY-fishY)*.018;
  }
}

// ── MAIN DRAW ────────────────────────────────────────────────────────────────
function draw(){
  ctx.clearRect(0,0,W,H);
  drawBg();

  const reefScenes=['hiding','heartshow','heartclick','heartbig','night'];
  if(reefScenes.includes(scene)) drawReef();

  if(scene==='hiding'||scene==='heartshow') corals.forEach(drawCoral);

  const noFish=['hiding','heartclick','heartbig'];
  if(!noFish.includes(scene)) drawFish(fishX,fishY,fishDir,animF);

  if(scene==='heartshow') drawFloatingHeart(fishX,fishY);
}

function loop(){ update(); draw(); requestAnimationFrame(loop); }

// ── START ────────────────────────────────────────────────────────────────────
showM('tócame', 700);
loop();
</script>
</body>
</html>
